# Patch's routing rules.
#
# All rules require webhookEvent == "jira:issue_updated" so comment-add and
# other side-events don't trip them.
#
# Status-keyed rules use `any_item` against `changelog.items` to match only
# on TRANSITIONS INTO a status, not on state-while-in-status. Field edits
# (Rank, Risk, Automation recomputes) made while a ticket is in Plan or
# Ready for Development don't re-fire Patch — only the transition into the
# status does. This was SPE-1774's fix; SPE-1733 was the incident that
# surfaced the bug (5 jobs, 2 duplicate PRs).
#
# Rule order matters — first match wins. Only Bug / Story / Task are routed
# for Plan and Ready for Development (those workflows carry type-specific
# guidance). Other issue types and other columns fall through to no-match
# and Patch does not run.
routing:
  jira:
    rules:

      # ── Plan: per-type ───────────────────────────────────────────────
      - name: plan-bug
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Bug }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Plan }
        messageTemplate: templates/jira-plan-bug.md

      - name: plan-story
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Story }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Plan }
        messageTemplate: templates/jira-plan-story.md

      - name: plan-task
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Task }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Plan }
        messageTemplate: templates/jira-plan-task.md

      # ── Ready for Development: per-type ──────────────────────────────
      - name: ready-for-development-bug
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Bug }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Ready for Development }
        messageTemplate: templates/jira-ready-for-dev-bug.md

      - name: ready-for-development-story
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Story }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Ready for Development }
        messageTemplate: templates/jira-ready-for-dev-story.md

      - name: ready-for-development-task
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Task }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Ready for Development }
        messageTemplate: templates/jira-ready-for-dev-task.md

      # ── Deploy to development: per-type ──────────────────────────────
      # Fires when a human transitions the ticket into "Deploy to
      # development" after Code Review — the human has approved the PR(s)
      # and Patch's job is to merge + advance the ticket to "Deployed to
      # Development".
      # Same template for all three types — deploy is mechanical (merge PRs
      # + transition), no per-type guidance like Plan/Ready-for-Development
      # has. Three rules (not one any-of) to stay consistent with the
      # existing per-type rule shape above.
      - name: deploy-to-dev-bug
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Bug }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Deploy to development }
        messageTemplate: templates/jira-deploy-to-dev.md

      - name: deploy-to-dev-story
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Story }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Deploy to development }
        messageTemplate: templates/jira-deploy-to-dev.md

      - name: deploy-to-dev-task
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Task }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Deploy to development }
        messageTemplate: templates/jira-deploy-to-dev.md

  # Slack rules: channel-id → environment mapping verified against the
  # Slack API on 2026-04-25. Previous version of this file had all three
  # rules pointed at the wrong channel, so Patch was labeling production
  # failures as "development" etc. on every fire — same template,
  # mislabeled output. Don't trust the rule name without checking the
  # channel id.
  slack:
    rules:
      - name: alerts-production
        condition:
          equals:
            field: event.channel
            value: C08UVJDJZTL  # #alerts-platform-failure-production
        messageTemplate: templates/slack-alert.md

      - name: alerts-testing
        condition:
          equals:
            field: event.channel
            value: C08UWMQJFBN  # #alerts-platform-failure-testing
        messageTemplate: templates/slack-alert.md

      - name: alerts-development
        condition:
          equals:
            field: event.channel
            value: C08V6MV0VNV  # #alerts-platform-failure-development
        messageTemplate: templates/slack-alert.md

modelRules:
  jira:
    - field: issue.fields.status.name
      matches:
        - Plan
        - Ready for Development
        - Deploy to development
      model: claude-opus-4-7
  slack:
    # Production failures get the smartest model — those are the ones
    # where misdiagnosis is most expensive. Dev/test stay on the runner
    # default. (Pre-fix this matched C08UVJDJZTL but was labeled
    # "testing" — the channel id was right, the label was wrong.)
    - field: event.channel
      matches:
        - C08UVJDJZTL  # #alerts-platform-failure-production
      model: claude-opus-4-7
