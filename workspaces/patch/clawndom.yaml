# Patch's routing rules.
#
# All rules require webhookEvent == "jira:issue_updated" so comment-add and
# other side-events don't trip them.
#
# Status-keyed rules use `any_item` against `changelog.items` to match only
# on TRANSITIONS INTO a status, not on state-while-in-status. Field edits
# (Rank, Risk, Automation recomputes) made while a ticket is in Plan or
# Ready for Development don't re-fire Patch — only the transition into the
# status does. This was SPE-1774's fix; SPE-1733 was the incident that
# surfaced the bug (5 jobs, 2 duplicate PRs).
#
# Rule order matters — first match wins. Only Bug / Story / Task are routed
# for Plan and Ready for Development (those workflows carry type-specific
# guidance). Other issue types and other columns fall through to no-match
# and Patch does not run.

# Memory namespace declaration — referenced by per-rule `memory.namespace`
# below. One namespace shared across plan + ready-for-dev + slack-alert so
# planning lessons flow into implementation runs and pattern-recognition
# on alerts cross-pollinates with both. Defaults: pruneAfter=365d,
# maxStoresPerRun=5. SPE-1988.
memory:
  namespaces:
    patch-personal:
      embeddingProvider: openai
      vectorStore: redis

routing:
  # Internal task dispatches — Scarlett dispatches Patch via POST /api/tasks
  # when her code review returns `changes_requested`. Symmetric to how Patch
  # dispatches Scarlett for plan-review and code-review (see scarlett/clawndom.yaml).
  # Conditions evaluate against `{ taskType, ...context }` per Clawndom's
  # internal-task routing convention.
  internal:
    rules:
      - name: address-pr-feedback
        condition:
          equals: { field: taskType, value: address-pr-feedback }
        messageTemplate: templates/address-pr-feedback.md
        memory:
          namespace: patch-personal
          retrieve:
            queryField: ticketTitle
            topK: 5
            minSimilarity: 0.4

  jira:
    rules:

      # ── Plan: per-type ───────────────────────────────────────────────
      - name: plan-bug
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Bug }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Plan }
        messageTemplate: templates/jira-plan-bug.md
        memory:
          namespace: patch-personal
          retrieve:
            queryField: issue.fields.summary
            topK: 5
            minSimilarity: 0.4

      - name: plan-story
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Story }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Plan }
        messageTemplate: templates/jira-plan-story.md
        memory:
          namespace: patch-personal
          retrieve:
            queryField: issue.fields.summary
            topK: 5
            minSimilarity: 0.4

      - name: plan-task
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Task }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Plan }
        messageTemplate: templates/jira-plan-task.md
        memory:
          namespace: patch-personal
          retrieve:
            queryField: issue.fields.summary
            topK: 5
            minSimilarity: 0.4

      # ── Ready for Development: per-type ──────────────────────────────
      # Ready-for-development rules carry maxTurns: 500 because the
      # implementation phase routinely cascades wider than the runner's
      # 150-turn default. A single tuple-shape change in the engine can
      # ripple through 18 test files = 60+ Edit calls = 60+ turns just
      # for mechanical destructure updates, before tests run, before any
      # PR. SPE-2010 hit the wall three times at 151 turns each ($13/run)
      # before this lift. 500 is a generous ceiling — most rule firings
      # finish well under it; the budget only matters for the worst case.
      - name: ready-for-development-bug
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Bug }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Ready for Development }
        messageTemplate: templates/jira-ready-for-dev-bug.md
        maxTurns: 500
        memory:
          namespace: patch-personal
          retrieve:
            queryField: issue.fields.summary
            topK: 5
            minSimilarity: 0.4

      - name: ready-for-development-story
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Story }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Ready for Development }
        messageTemplate: templates/jira-ready-for-dev-story.md
        maxTurns: 500
        memory:
          namespace: patch-personal
          retrieve:
            queryField: issue.fields.summary
            topK: 5
            minSimilarity: 0.4

      - name: ready-for-development-task
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Task }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Ready for Development }
        messageTemplate: templates/jira-ready-for-dev-task.md
        maxTurns: 500
        memory:
          namespace: patch-personal
          retrieve:
            queryField: issue.fields.summary
            topK: 5
            minSimilarity: 0.4

      # ── Deploy to development: per-type ──────────────────────────────
      # Fires when a human transitions the ticket into "Deploy to
      # development" after Code Review — the human has approved the PR(s)
      # and Patch's job is to merge + advance the ticket to "Deployed to
      # Development".
      # Same template for all three types — deploy is mechanical (merge PRs
      # + transition), no per-type guidance like Plan/Ready-for-Development
      # has. Three rules (not one any-of) to stay consistent with the
      # existing per-type rule shape above.
      - name: deploy-to-dev-bug
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Bug }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Deploy to development }
        messageTemplate: templates/jira-deploy-to-dev.md

      - name: deploy-to-dev-story
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Story }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Deploy to development }
        messageTemplate: templates/jira-deploy-to-dev.md

      - name: deploy-to-dev-task
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Task }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Deploy to development }
        messageTemplate: templates/jira-deploy-to-dev.md

      # ── Verified in Development: pulse-promote development → testing ─
      # Trigger fires per ticket but the action is batched. The three
      # repos share a single `testing` branch and the only safe promote
      # is `development → testing` carrying every commit that's ahead.
      # Cherry-picking a single ticket's commits would corrupt history.
      # The template's Step-2 quiet-pipeline guard ensures nothing in
      # Deploy-to-Dev or Deployed-to-Dev is silently riding along — if
      # something is, the run posts a deferral comment and exits without
      # transitioning the trigger ticket, so the next pulse picks it up.
      # See workspaces/patch/templates/jira-verified-in-dev.md.
      - name: verified-in-dev-bug
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Bug }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Verified in Development }
        messageTemplate: templates/jira-verified-in-dev.md

      - name: verified-in-dev-story
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Story }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Verified in Development }
        messageTemplate: templates/jira-verified-in-dev.md

      - name: verified-in-dev-task
        condition:
          all_of:
            - equals: { field: webhookEvent, value: "jira:issue_updated" }
            - equals: { field: issue.fields.issuetype.name, value: Task }
            - any_item:
                path: changelog.items
                where:
                  all_of:
                    - equals: { field: field, value: status }
                    - equals: { field: toString, value: Verified in Development }
        messageTemplate: templates/jira-verified-in-dev.md

  # GitHub rules: catch-all for PR check failures that arrive AFTER the
  # run that opened the PR has ended (typical case: ready-for-dev or
  # address-pr-feedback hits its turn budget right when CI is reporting
  # red, so the in-template Step-7 watcher exits before seeing the
  # failure). The ready-for-dev / address-pr-feedback flows already
  # have their own CI loops; this is the out-of-band fallback.
  #
  # Trigger condition: check_suite.completed with conclusion=failure on
  # a PR-attached check suite. Filter:
  #   - action == "completed"          (one event per suite; ignore created/requested)
  #   - check_suite.conclusion=failure (skip success/cancelled/neutral/skipped)
  #   - check_suite.pull_requests has ≥1 entry (skip pushes to base branches)
  github:
    rules:
      - name: pr-broken
        condition:
          all_of:
            - equals: { field: action, value: completed }
            - equals: { field: check_suite.conclusion, value: failure }
            - any_item:
                path: check_suite.pull_requests
                where:
                  exists: { field: number }
        messageTemplate: templates/github-pr-broken.md
        maxTurns: 200
        memory:
          namespace: patch-personal
          retrieve:
            queryField: check_suite.head_commit.message
            topK: 5
            minSimilarity: 0.4

  # Slack rules: channel-id → environment mapping verified against the
  # Slack API on 2026-04-25. Previous version of this file had all three
  # rules pointed at the wrong channel, so Patch was labeling production
  # failures as "development" etc. on every fire — same template,
  # mislabeled output. Don't trust the rule name without checking the
  # channel id.
  #
  # Each rule has three predicates beyond the channel match:
  #   - exists(event.bot_id) — only fire on bot-authored messages.
  #     Alerts come from the alerting bot (or any monitor bot integration);
  #     a human typing "hi" in the channel has no bot_id and is filtered.
  #   - not(equals(event.bot_id, "B0ALY9FMKE2")) — never fire on our own
  #     `patch` bot's replies. Patch posts in-thread diagnoses; without
  #     this filter, that reply is itself a message.channels event and
  #     Patch would fire on its own output → infinite self-loop until
  #     Slack rate-limits or Claude CLI hits its turn cap.
  slack:
    rules:
      - name: alerts-production
        condition:
          all_of:
            - equals:
                field: event.channel
                value: C08UVJDJZTL  # #alerts-platform-failure-production
            - exists: { field: event.bot_id }
            - not:
                equals: { field: event.bot_id, value: B0ALY9FMKE2 }
        messageTemplate: templates/slack-alert.md
        memory:
          namespace: patch-personal
          retrieve:
            queryField: event.text
            topK: 5
            minSimilarity: 0.4

      - name: alerts-testing
        condition:
          all_of:
            - equals:
                field: event.channel
                value: C08UWMQJFBN  # #alerts-platform-failure-testing
            - exists: { field: event.bot_id }
            - not:
                equals: { field: event.bot_id, value: B0ALY9FMKE2 }
        messageTemplate: templates/slack-alert.md
        memory:
          namespace: patch-personal
          retrieve:
            queryField: event.text
            topK: 5
            minSimilarity: 0.4

      - name: alerts-development
        condition:
          all_of:
            - equals:
                field: event.channel
                value: C08V6MV0VNV  # #alerts-platform-failure-development
            - exists: { field: event.bot_id }
            - not:
                equals: { field: event.bot_id, value: B0ALY9FMKE2 }
        messageTemplate: templates/slack-alert.md
        memory:
          namespace: patch-personal
          retrieve:
            queryField: event.text
            topK: 5
            minSimilarity: 0.4

modelRules:
  jira:
    - field: issue.fields.status.name
      matches:
        - Plan
        - Ready for Development
        - Deploy to development
        - Verified in Development
      model: claude-opus-4-7
  github:
    # PR-broken triage needs to read failing-job logs (often verbose),
    # diff against base, and decide whether the fix is mechanical
    # (rename, add test) or structural (rule misfire, base-branch
    # rot). Misdiagnosis spends a turn budget on the wrong fix and
    # potentially escalates to Blocked when the issue was tractable.
    # Default Opus to match the cost/quality of the ready-for-dev path.
    - field: check_suite.conclusion
      matches:
        - failure
      model: claude-opus-4-7
  slack:
    # Production failures get the smartest model — those are the ones
    # where misdiagnosis is most expensive. Dev/test stay on the runner
    # default. (Pre-fix this matched C08UVJDJZTL but was labeled
    # "testing" — the channel id was right, the label was wrong.)
    - field: event.channel
      matches:
        - C08UVJDJZTL  # #alerts-platform-failure-production
      model: claude-opus-4-7
